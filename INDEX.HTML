<!DOCTYPE html>
<html>
<head>
<title>VM SHADOW</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

header {
  background: black;
  padding: 15px;
  text-align: center;
}

#chat {
  height: 75vh;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
  max-width: 70%;
}

.user {
  background: blue;
  margin-left: auto;
}

.bot {
  background: gray;
}

#controls {
  display: flex;
  position: fixed;
  bottom: 0;
  width: 100%;
}

input {
  flex: 1;
  padding: 15px;
  border: none;
}

button {
  padding: 15px;
  border: none;
  background: green;
  color: white;
}

#pay {
  background: orange;
}
</style>

</head>

<body>

<header>MADHAVAA SHADOW AI 🤖</header>

<div id="chat"></div>

<div id="controls">
  <input id="input" placeholder="Ask anything...">
  <button onclick="send()">Send</button>
  <button onclick="voice()">🎤</button>
  <button id="pay" onclick="pay()">💸</button>
</div>

<script>
let userId = Math.random().toString(36).substring(7);

async function send() {
  let msg = document.getElementById("input").value;
  let chat = document.getElementById("chat");

  if (!msg) return;

  chat.innerHTML += "<div class='msg user'>" + msg + "</div>";
  document.getElementById("input").value = "";

  chat.innerHTML += "<div class='msg bot' id='loading'>Typing...</div>";

  let res = await fetch("https://YOUR-RENDER-LINK/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({message: msg, userId: userId})
  });

  let data = await res.json();

  document.getElementById("loading").remove();
  chat.innerHTML += "<div class='msg bot'>" + data.reply + "</div>";

  chat.scrollTop = chat.scrollHeight;
}

// 🎤 Voice
function voice() {
  let recognition = new webkitSpeechRecognition();
  recognition.lang = "en-IN";

  recognition.onresult = function(e) {
    document.getElementById("input").value = e.results[0][0].transcript;
    send();
  };

  recognition.start();
}

// 💸 Payment
function pay() {
  window.location.href = "upi://pay?pa=7081721056@upi&pn=MadhavaaShadow&am=49";
}
</script>

</body>
</html>
